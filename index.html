<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="./icons/icon-192.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#a78bfa" />
    <!-- iOS PWA meta -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Lingo Mingle" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lingo Mingle</title>
    <style>
      /* ─── Meadow — Light Violet (default) ───────────────────────────── */
      :root.theme-meadow {
        --color-primary: #7c3aed;
        --color-primary-dark: #6d28d9;
        --color-secondary: #ec4899;
        --color-accent: #f59e0b;
        --color-success: #10b981;
        --color-warning: #f59e0b;
        --color-error: #ef4444;
        --color-neutral: #4b5563;
        --color-base-100: #f8f7ff;
        --color-base-200: #ede9fe;
        --color-base-300: #ddd6fe;
        --color-surface: rgba(255, 255, 255, 0.75);
        --color-text-main: #1e1b4b;
        --color-text-secondary: #4c1d95;
        --color-text-muted: #7c3aed80;
        --color-primary-content: #ffffff;
        --aurora-1: rgba(124, 58, 237, 0.18);
        --aurora-2: rgba(236, 72, 153, 0.14);
      }

      /* ─── Daybreak — Warm Sunrise ────────────────────────────────────── */
      :root.theme-daybreak {
        --color-primary: #f97316;
        --color-primary-dark: #ea580c;
        --color-secondary: #8b5cf6;
        --color-accent: #fbbf24;
        --color-success: #10b981;
        --color-warning: #f59e0b;
        --color-error: #ef4444;
        --color-neutral: #44403c;
        --color-base-100: #fffbf5;
        --color-base-200: #fff7ed;
        --color-base-300: #fed7aa;
        --color-surface: rgba(255, 251, 245, 0.82);
        --color-text-main: #431407;
        --color-text-secondary: #7c2d12;
        --color-text-muted: #9a3412;
        --color-primary-content: #ffffff;
        --aurora-1: rgba(249, 115, 22, 0.14);
        --aurora-2: rgba(139, 92, 246, 0.12);
      }

      /* ─── Twilight — Deep Space Dark ────────────────────────────────── */
      :root.theme-twilight {
        --color-primary: #a78bfa;
        --color-primary-dark: #8b5cf6;
        --color-secondary: #34d399;
        --color-accent: #fb7185;
        --color-success: #34d399;
        --color-warning: #fbbf24;
        --color-error: #f87171;
        --color-neutral: #c4b5fd;
        --color-base-100: #080c18;
        --color-base-200: #0e1425;
        --color-base-300: #172035;
        --color-surface: rgba(15, 22, 41, 0.78);
        --color-text-main: #e8e8f5;
        --color-text-secondary: #c4b5fd;
        --color-text-muted: #6d6a8a;
        --color-primary-content: #ffffff;
        --aurora-1: rgba(167, 139, 250, 0.22);
        --aurora-2: rgba(52, 211, 153, 0.14);
      }

      /* ─── Forest — Bioluminescent Dark ──────────────────────────────── */
      :root.theme-forest {
        --color-primary: #10b981;
        --color-primary-dark: #059669;
        --color-secondary: #fcd34d;
        --color-accent: #a78bfa;
        --color-success: #10b981;
        --color-warning: #fbbf24;
        --color-error: #f87171;
        --color-neutral: #6ee7b7;
        --color-base-100: #060f0a;
        --color-base-200: #0b1a10;
        --color-base-300: #142b1c;
        --color-surface: rgba(11, 26, 16, 0.78);
        --color-text-main: #ecfdf5;
        --color-text-secondary: #6ee7b7;
        --color-text-muted: #2d6a4f;
        --color-primary-content: #022c22;
        --aurora-1: rgba(16, 185, 129, 0.22);
        --aurora-2: rgba(167, 139, 250, 0.12);
      }

      /* ─── Glass Utilities ────────────────────────────────────────────── */
      .glass {
        background: var(--color-surface);
        backdrop-filter: blur(24px) saturate(180%);
        -webkit-backdrop-filter: blur(24px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.14);
        box-shadow:
          0 4px 24px rgba(0, 0, 0, 0.10),
          inset 0 1px 0 rgba(255, 255, 255, 0.18);
      }

      .glass-heavy {
        background: var(--color-surface);
        backdrop-filter: blur(48px) saturate(200%);
        -webkit-backdrop-filter: blur(48px) saturate(200%);
        border: 1px solid rgba(255, 255, 255, 0.20);
        box-shadow:
          0 12px 48px rgba(0, 0, 0, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.22);
      }

      .glass-card {
        background: var(--color-surface);
        backdrop-filter: blur(20px) saturate(160%);
        -webkit-backdrop-filter: blur(20px) saturate(160%);
        border: 1px solid rgba(255, 255, 255, 0.16);
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.10),
          inset 0 1px 0 rgba(255, 255, 255, 0.14);
      }

      /* ─── Glow ───────────────────────────────────────────────────────── */
      .glow-primary {
        box-shadow:
          0 0 0 1px var(--color-primary),
          0 0 24px rgba(var(--color-primary), 0.3),
          0 4px 16px rgba(0, 0, 0, 0.10);
      }

      .glow-primary:hover {
        box-shadow:
          0 0 0 1px var(--color-primary),
          0 0 40px rgba(var(--color-primary), 0.4),
          0 8px 24px rgba(0, 0, 0, 0.15);
      }

      /* ─── Shimmer ────────────────────────────────────────────────────── */
      @keyframes shimmer {
        from { background-position: -200% center; }
        to   { background-position:  200% center; }
      }

      .shimmer {
        background: linear-gradient(90deg,
          transparent 0%, rgba(255,255,255,0.28) 50%, transparent 100%);
        background-size: 200% 100%;
        animation: shimmer 3s infinite;
      }

      /* ─── Gradient border ────────────────────────────────────────────── */
      .refract-border {
        border: 2px solid transparent;
        background-image:
          linear-gradient(var(--color-base-100), var(--color-base-100)),
          linear-gradient(135deg,
            rgba(255,255,255,0.4),
            var(--color-primary),
            var(--color-secondary),
            rgba(255,255,255,0.4));
        background-origin: border-box;
        background-clip: padding-box, border-box;
      }
    </style>
    <link rel="stylesheet" href="./index.css">
</head>
  <body class="bg-base-300">
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
