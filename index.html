<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="./icons/icon-192.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#a78bfa" />
    <!-- iOS PWA meta -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Lingo Mingle" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lingo Mingle</title>
    <style>
      /* Meadow theme - Modern iOS Light (Purple gradient) */
      :root.theme-meadow {
        --color-primary: #6366f1;
        --color-primary-dark: #4f46e5;
        --color-secondary: #ec4899;
        --color-accent: #fde047;
        --color-success: #10b981;
        --color-warning: #f59e0b;
        --color-error: #ef4444;
        --color-neutral: #4b5563;
        --color-base-100: #fafafa;
        --color-base-200: #f5f5f5;
        --color-base-300: #e5e7eb;
        --color-surface: rgba(255, 255, 255, 0.8);
        --color-text-main: #1f2937;
        --color-text-secondary: #6b7280;
        --color-text-muted: #9ca3af;
        --color-primary-content: #ffffff;
      }

      /* Daybreak theme - Modern iOS Light (Warm tones) */
      :root.theme-daybreak {
        --color-primary: #f59e0b;
        --color-primary-dark: #d97706;
        --color-secondary: #60a5fa;
        --color-accent: #f472b6;
        --color-success: #10b981;
        --color-warning: #f59e0b;
        --color-error: #ef4444;
        --color-neutral: #44403c;
        --color-base-100: #fafafa;
        --color-base-200: #fef3c7;
        --color-base-300: #fde68a;
        --color-surface: rgba(255, 255, 255, 0.8);
        --color-text-main: #1c1917;
        --color-text-secondary: #78716c;
        --color-text-muted: #a8a29e;
        --color-primary-content: #ffffff;
      }

      /* Twilight theme - Modern iOS Dark (True Black) */
      :root.theme-twilight {
        --color-primary: #818cf8;
        --color-primary-dark: #6366f1;
        --color-secondary: #f472b6;
        --color-accent: #2dd4bf;
        --color-success: #34d399;
        --color-warning: #fbbf24;
        --color-error: #f87171;
        --color-neutral: #d1d5db;
        --color-base-100: #0f0f0f;
        --color-base-200: #1a1a1a;
        --color-base-300: #262626;
        --color-surface: rgba(255, 255, 255, 0.05);
        --color-text-main: #f9fafb;
        --color-text-secondary: #d1d5db;
        --color-text-muted: #9ca3af;
        --color-primary-content: #ffffff;
      }

      /* Forest theme - Modern iOS Dark (Green accent) */
      :root.theme-forest {
        --color-primary: #34d399;
        --color-primary-dark: #10b981;
        --color-secondary: #facc15;
        --color-accent: #e879f9;
        --color-success: #34d399;
        --color-warning: #fbbf24;
        --color-error: #f87171;
        --color-neutral: #a8a29e;
        --color-base-100: #0f0f0f;
        --color-base-200: #1c1917;
        --color-base-300: #292524;
        --color-surface: rgba(255, 255, 255, 0.05);
        --color-text-main: #fafaf9;
        --color-text-secondary: #d6d3d1;
        --color-text-muted: #a8a29e;
        --color-primary-content: #1c1917;
      }

      /* Liquid Glass Effect (iOS 26 style) */
      .glass {
        position: relative;
        background: var(--color-surface);
        backdrop-filter: blur(40px) saturate(200%) brightness(1.1);
        -webkit-backdrop-filter: blur(40px) saturate(200%) brightness(1.1);
        border: 1px solid rgba(255, 255, 255, 0.18);
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.15);
      }

      /* Glass with light reflection */
      .glass::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 50%;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.12) 0%,
          rgba(255, 255, 255, 0) 100%
        );
        border-radius: inherit;
        pointer-events: none;
      }

      .glass-heavy {
        background: var(--color-surface);
        backdrop-filter: blur(60px) saturate(200%) brightness(1.15);
        -webkit-backdrop-filter: blur(60px) saturate(200%) brightness(1.15);
        border: 1px solid rgba(255, 255, 255, 0.25);
        box-shadow:
          0 12px 48px rgba(0, 0, 0, 0.18),
          inset 0 2px 0 rgba(255, 255, 255, 0.2),
          inset 0 -1px 0 rgba(0, 0, 0, 0.1);
      }

      /* Frosted card with glow */
      .glass-card {
        position: relative;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.1) 0%,
          rgba(255, 255, 255, 0.05) 100%
        );
        backdrop-filter: blur(30px) saturate(180%) brightness(1.1);
        -webkit-backdrop-filter: blur(30px) saturate(180%) brightness(1.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.1),
          0 0 0 1px rgba(255, 255, 255, 0.1) inset;
      }

      /* Glow effect for interactive elements */
      .glow-primary {
        box-shadow:
          0 0 20px rgba(99, 102, 241, 0.4),
          0 0 40px rgba(99, 102, 241, 0.2),
          0 4px 16px rgba(0, 0, 0, 0.1);
      }

      .glow-primary:hover {
        box-shadow:
          0 0 30px rgba(99, 102, 241, 0.6),
          0 0 60px rgba(99, 102, 241, 0.3),
          0 8px 24px rgba(0, 0, 0, 0.15);
      }

      /* Shimmer effect */
      @keyframes shimmer {
        0% {
          background-position: -200% center;
        }
        100% {
          background-position: 200% center;
        }
      }

      .shimmer {
        background: linear-gradient(
          90deg,
          transparent 0%,
          rgba(255, 255, 255, 0.3) 50%,
          transparent 100%
        );
        background-size: 200% 100%;
        animation: shimmer 3s infinite;
      }

      /* Light refraction border */
      .refract-border {
        border: 2px solid transparent;
        background-image:
          linear-gradient(var(--color-base-100), var(--color-base-100)),
          linear-gradient(
            135deg,
            rgba(255, 255, 255, 0.4),
            rgba(99, 102, 241, 0.3),
            rgba(236, 72, 153, 0.3),
            rgba(255, 255, 255, 0.4)
          );
        background-origin: border-box;
        background-clip: padding-box, border-box;
      }
    </style>
    <link rel="stylesheet" href="./index.css">
</head>
  <body class="bg-base-300">
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
